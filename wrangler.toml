name = "exchange-rate-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
DB_NAME = "exchange_rates"

# ─── KV Namespace for API Keys ───────────────────────────────────────────────
# First time setup:
#   1. Run:  npm run kv:create
#   2. Copy the output `id` values below
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "API_KEYS"
id = "a3dc775177da437a8e76c26949b1639c"
preview_id = "4029036b72644199b520e4081d1bb818"

# ─── MongoDB URI ──────────────────────────────────────────────────────────────
# Store as a secret (not in this file):
#   wrangler secret put MONGODB_URI
# For local dev, set it in .dev.vars
# ─────────────────────────────────────────────────────────────────────────────
